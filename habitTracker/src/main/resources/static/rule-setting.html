<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — Rules</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="stylesheet" href="/styles/pages/rules.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/today" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav"></nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="rules-page">
    <h1 class="rules-page__title">Habit Combination Rules</h1>
    <p class="rules-page__subtitle">Pick a main habit, combine it with others, and generate a merged frequency.</p>

    <div class="rules-panels">
      <div class="rules-panel">
        <div>
          <div class="rules-panel__title">Main Habit</div>
          <div class="rules-panel__hint">Select one — single select</div>
        </div>
        <div class="rules-habit-list" id="left-habits"></div>
        <a href="/habits/add" class="btn btn--ghost btn--sm">+ New Habit</a>
      </div>

      <div class="rules-panel">
        <div>
          <div class="rules-panel__title">Combine With</div>
          <div class="rules-panel__hint">Select one or more — multi select</div>
        </div>
        <div class="rules-habit-list" id="right-habits"></div>
      </div>
    </div>

    <div class="rules-freq">
      <div class="rules-freq__options">
        <span style="font-size:var(--text-sm);color:var(--color-text-secondary);font-weight:600;margin-bottom:var(--space-1);">Frequency strategy</span>
        <label class="rules-radio">
          <input type="radio" name="freq" value="average" checked>
          Average of selected habits
        </label>
        <label class="rules-radio">
          <input type="radio" name="freq" value="gcd">
          GCD of selected habits
        </label>
        <label class="rules-radio">
          <input type="radio" name="freq" value="custom">
          Custom:&nbsp;
          <input class="input" type="number" min="1" id="custom-freq"
            style="width:90px;height:32px;display:inline-block;" placeholder="days" disabled>
        </label>
      </div>

      <div class="rules-freq__result">
        <span class="rules-freq__result-label">Resulting frequency</span>
        <span class="rules-freq__result-value" id="result-frequency">—</span>
      </div>
    </div>

    <div class="rules-actions">
      <button class="btn btn--primary btn--lg" id="save-rule-btn">Save Rule</button>
      <a href="/habits/list" class="btn btn--ghost">Cancel</a>
    </div>
  </main>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script>
    function csrf() {
      const m = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='));
      return m ? decodeURIComponent(m.split('=')[1]) : '';
    }

    // ── Frequency math ────────────────────────────────────────────
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    function gcdArr(arr) { return arr.length === 0 ? 0 : arr.reduce((a, b) => gcd(a, b)); }

    function getSelectedFreqs() {
      const left  = document.querySelector('#left-habits .rules-habit-item.active');
      const right = Array.from(document.querySelectorAll('#right-habits .rules-habit-item.active'));
      if (!left || right.length === 0) return [];
      return [left, ...right].map(el => Number(el.dataset.frequency)).filter(f => !isNaN(f));
    }

    function updateResult() {
      const strategy = document.querySelector('input[name="freq"]:checked').value;
      const box      = document.getElementById('result-frequency');
      const freqs    = getSelectedFreqs();

      if (strategy === 'average') {
        box.textContent = freqs.length ? Math.round(freqs.reduce((a, b) => a + b, 0) / freqs.length) : '—';
      } else if (strategy === 'gcd') {
        box.textContent = freqs.length ? gcdArr(freqs) : '—';
      } else {
        const v = document.getElementById('custom-freq').value;
        box.textContent = v || '—';
      }
    }

    // ── Build items ───────────────────────────────────────────────
    function buildItem(h, side) {
      const div = document.createElement('div');
      div.className = 'rules-habit-item';
      div.dataset.id        = h.id;
      div.dataset.frequency = h.frequency;
      div.dataset.streak    = h.streak;
      div.textContent       = h.name;

      if (side === 'left') {
        div.addEventListener('click', () => {
          // single-select
          document.querySelectorAll('#left-habits .rules-habit-item').forEach(el => el.classList.remove('active'));
          div.classList.toggle('active');
          // sync right deselect if left deselected
          if (!div.classList.contains('active')) {
            const mirror = document.querySelector(`#right-habits .rules-habit-item[data-id="${h.id}"]`);
            if (mirror) mirror.classList.remove('active');
          }
          updateResult();
        });
      } else {
        div.addEventListener('click', () => {
          div.classList.toggle('active');
          if (!div.classList.contains('active')) {
            const mirror = document.querySelector(`#left-habits .rules-habit-item[data-id="${h.id}"]`);
            if (mirror) mirror.classList.remove('active');
          }
          updateResult();
        });
      }

      return div;
    }

    // ── Save rule ─────────────────────────────────────────────────
    function saveRule() {
      const left  = document.querySelector('#left-habits .rules-habit-item.active');
      const right = Array.from(document.querySelectorAll('#right-habits .rules-habit-item.active'));
      if (!left || right.length === 0) {
        alert('Select one main habit and at least one habit to combine with.');
        return;
      }
      const frequency = Number(document.getElementById('result-frequency').textContent) || 0;
      if (!frequency) { alert('Resulting frequency is invalid.'); return; }

      const streak = Math.max(
        Number(left.dataset.streak),
        ...right.map(el => Number(el.dataset.streak))
      );

      fetch('/habits/addRule', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-XSRF-TOKEN': csrf() },
        body: JSON.stringify({
          mainId:    Number(left.dataset.id),
          subIds:    right.map(el => Number(el.dataset.id)),
          frequency,
          streak
        })
      }).then(r => r.ok ? (window.location.href = ENV.ROUTES.HABITS_LIST) : alert('Failed to save rule.'))
        .catch(() => alert('Failed to save rule.'));
    }

    // ── Init ──────────────────────────────────────────────────────
    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/habits/rules');

      const habits = await fetch(ENV.ENDPOINTS.HABITS_RULES, { credentials: 'include' }).then(r => r.json());

      const leftEl  = document.getElementById('left-habits');
      const rightEl = document.getElementById('right-habits');

      if (!habits || habits.length === 0) {
        leftEl.innerHTML  = '<div class="rules-empty-msg">No active habits yet.</div>';
        rightEl.innerHTML = '<div class="rules-empty-msg">No habits to combine.</div>';
        return;
      }

      habits.forEach(h => {
        leftEl.appendChild(buildItem(h, 'left'));
        rightEl.appendChild(buildItem(h, 'right'));
      });

      // Frequency controls
      document.querySelectorAll('input[name="freq"]').forEach(r => {
        r.addEventListener('change', () => {
          document.getElementById('custom-freq').disabled = r.value !== 'custom';
          updateResult();
        });
      });
      document.getElementById('custom-freq').addEventListener('input', updateResult);
      document.getElementById('save-rule-btn').addEventListener('click', saveRule);
    }

    init();
  </script>
</body>
</html>
