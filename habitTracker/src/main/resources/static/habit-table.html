<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Overview</title>
    <link rel="stylesheet" href="/tableView/habit-table.css">
    <link rel="stylesheet" href="/css/navigation.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <div class="nav-brand"><a href="/" class="nav-logo">HabitTracker</a></div>
            <ul class="nav-links">
                <li><a href="/" class="nav-item">Today</a></li>
                <li><a href="/habits/list" class="nav-item">My Habits</a></li>
                <li><a href="/habits/table" class="nav-item active">Overview</a></li>
                <li><a href="/habits/rules" class="nav-item">Rules</a></li>
                <li><a href="/kpis" class="nav-item">KPIs</a></li>
                <li><a href="/kpis/dashboard" class="nav-item">KPI Dashboard</a></li>
                <li>
                    <form id="logout-form" action="/logout" method="post" style="margin:0">
                        <input type="hidden" id="logout-csrf" name="_csrf" value="">
                        <button type="submit" class="nav-item">Sign out</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1 class="table-header">
            Habit Overview
            <span class="date-range" id="date-range"></span>
        </h1>

        <div class="date-picker-container">
            <label for="start-date">Start Date:</label>
            <input type="date" id="start-date">
            <label for="end-date">End Date:</label>
            <input type="date" id="end-date">
            <button id="update-table" onclick="fetchUpdatedTable()">Update</button>
        </div>

        <div class="table-container">
            <table class="habit-table">
                <thead>
                    <tr id="table-header-row">
                        <th class="date-column">Date</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="/tableView/habit-table.js"></script>
    <script>
        function getCsrfCookie() {
            const match = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='));
            return match ? decodeURIComponent(match.split('=')[1]) : '';
        }

        async function init() {
            const authRes = await fetch('/auth/me', { credentials: 'include' });
            if (!authRes.ok) { window.location.href = '/login'; return; }

            document.getElementById('logout-csrf').value = getCsrfCookie();

            const data = await fetch('/api/habits/table', { credentials: 'include' }).then(r => r.json());

            if (!data.habitNames || data.habitNames.length === 0) {
                document.querySelector('.date-picker-container').style.display = 'none';
                document.querySelector('.table-container').innerHTML = `
                    <div class="empty-state">
                        <h2>No habits to track yet</h2>
                        <p>Create your first habit and it will appear here in the overview table.</p>
                        <a href="/habits/add" class="empty-state-btn">Create your first habit</a>
                    </div>
                `;
                return;
            }

            document.getElementById('start-date').value = data.startDate;
            document.getElementById('end-date').value = data.endDate;
            document.getElementById('date-range').textContent = data.startDate + ' - ' + data.endDate;

            // build header columns
            const headerRow = document.getElementById('table-header-row');
            data.habitNames.forEach(pair => {
                const th = document.createElement('th');
                th.textContent = pair.key;
                headerRow.appendChild(th);
            });

            // render initial rows using existing updateTable from habit-table.js
            updateTable(data.tableData);
        }

        init();
    </script>
</body>
</html>
