<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — Overview</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="stylesheet" href="/styles/pages/overview.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/today" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav"></nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="overview-page">
    <div class="overview-page__header">
      <h1 class="overview-page__title">Overview</h1>
      <span class="overview-page__range" id="date-range"></span>
    </div>

    <div class="overview-datepicker" id="datepicker-row">
      <label for="start-date">From</label>
      <input class="input" style="width:160px;height:36px;" type="date" id="start-date">
      <label for="end-date">To</label>
      <input class="input" style="width:160px;height:36px;" type="date" id="end-date">
      <button class="btn btn--ghost btn--sm" onclick="fetchUpdatedTable()">Update</button>
    </div>

    <div id="table-area">
      <div class="overview-table-wrap">
        <table class="overview-table">
          <thead>
            <tr id="table-header-row">
              <th class="date-col">Date</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script>
    function csrf() {
      const m = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='));
      return m ? decodeURIComponent(m.split('=')[1]) : '';
    }

    function getHabitOrder() {
      return Array.from(document.querySelectorAll('.overview-table thead th'))
        .slice(1)
        .map(th => th.textContent.trim());
    }

    function findKey(habits, name) {
      return Object.keys(habits).find(k => {
        const m = k.match(/Pair\(key=(.*), value=(-?\d+)\)/);
        return m && m[1] === name;
      });
    }

    function updateHabitStatus(cb) {
      if (cb.getAttribute('data-habit-status') === 'INACTIVE') { cb.checked = false; return; }
      const id        = cb.getAttribute('data-habit-id');
      const completed = cb.checked;
      fetch(ENV.ENDPOINTS.HABIT_UPDATE(id), {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-XSRF-TOKEN': csrf() },
        body: new URLSearchParams({ completed, date: cb.getAttribute('data-date') })
      }).then(r => { if (!r.ok) cb.checked = !completed; });
    }

    function buildRows(data) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      const order = getHabitOrder();

      data.forEach(entry => {
        const tr = document.createElement('tr');
        const dateCell = document.createElement('td');
        dateCell.className = 'date-cell';
        dateCell.textContent = entry.date;
        tr.appendChild(dateCell);

        order.forEach(habitName => {
          const td = document.createElement('td');
          td.className = 'habit-cell';
          const cb = document.createElement('input');
          cb.type = 'checkbox';
          cb.className = 'habit-toggle';
          cb.setAttribute('data-date', entry.date);

          const key = findKey(entry.habits, habitName);
          if (key) {
            const val = entry.habits[key];
            cb.checked = val;
            const m = key.match(/Pair\(key=(.*), value=(-?\d+)\)/);
            if (m) {
              cb.setAttribute('data-habit-name', m[1]);
              cb.setAttribute('data-habit-id', m[2]);
              const status = entry.habitStatuses && entry.habitStatuses[key];
              if (status === 'INACTIVE') {
                cb.classList.add('inactive');
                cb.disabled = true;
                cb.setAttribute('data-habit-status', 'INACTIVE');
              } else {
                cb.setAttribute('data-habit-status', status || 'ACTIVE_INCOMPLETE');
              }
            }
          } else {
            cb.checked = false;
            cb.setAttribute('data-habit-name', habitName);
            cb.setAttribute('data-habit-id', '');
            cb.setAttribute('data-habit-status', 'ACTIVE_INCOMPLETE');
          }

          cb.onchange = () => updateHabitStatus(cb);
          td.appendChild(cb);
          tr.appendChild(td);
        });

        tbody.appendChild(tr);
      });
    }

    function fetchUpdatedTable() {
      const start = document.getElementById('start-date').value;
      const end   = document.getElementById('end-date').value;
      if (!start || !end) { alert('Please select both dates.'); return; }
      fetch(`/habits/tableAsync?startDate=${start}&endDate=${end}`, {
        headers: { Accept: 'application/json' }
      }).then(r => r.json()).then(buildRows)
        .catch(() => alert('Failed to update table.'));
    }

    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/habits/table');

      const data = await fetch(ENV.ENDPOINTS.HABITS_TABLE, { credentials: 'include' }).then(r => r.json());

      if (!data.habitNames || data.habitNames.length === 0) {
        document.getElementById('datepicker-row').style.display = 'none';
        document.getElementById('table-area').innerHTML = `
          <div class="overview-empty">
            <h2>No habits to track yet</h2>
            <p>Create your first habit and it will appear here.</p>
            <a href="/habits/add" class="btn btn--primary">Create your first habit</a>
          </div>`;
        return;
      }

      document.getElementById('start-date').value = data.startDate;
      document.getElementById('end-date').value   = data.endDate;
      document.getElementById('date-range').textContent = data.startDate + ' – ' + data.endDate;

      const headerRow = document.getElementById('table-header-row');
      data.habitNames.forEach(pair => {
        const th = document.createElement('th');
        th.textContent = pair.key;
        headerRow.appendChild(th);
      });

      buildRows(data.tableData);
    }

    init();
  </script>
</body>
</html>
