<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — New Habit</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/molecules/form-group.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav">
        <a href="/"               class="topbar__link">Today</a>
        <a href="/habits/list"    class="topbar__link">My Habits</a>
        <a href="/habits/table"   class="topbar__link">Overview</a>
        <a href="/habits/rules"   class="topbar__link">Rules</a>
        <a href="/kpis"           class="topbar__link">KPIs</a>
        <a href="/kpis/dashboard" class="topbar__link">KPI Dashboard</a>
      </nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="form-page">
    <div class="form-card">
      <div>
        <div class="form-card__title">New Habit</div>
        <div class="form-card__subtitle">Define what you want to track and how often.</div>
      </div>

      <form id="new-habit-form" class="habit-form form-card__fields">
        <div class="form-group">
          <label class="form-group__label" for="name">Habit Name</label>
          <input class="input" type="text" id="name" name="name"
            placeholder="e.g. Read for 20 minutes" required>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="frequency">Frequency</label>
          <select class="input" id="frequency" name="frequency" required>
            <option value="">Select frequency</option>
            <option value="1">Daily</option>
            <option value="7">Weekly</option>
            <option value="30">Monthly</option>
            <option value="CUSTOM">Custom</option>
          </select>
        </div>

        <div class="form-group" id="custom-frequency-container" style="display:none;">
          <label class="form-group__label" for="customFrequency">Custom interval (days)</label>
          <input class="input" type="number" id="customFrequency" min="1" placeholder="e.g. 3">
          <span class="form-group__hint">Days between each occurrence</span>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="startDate">Start Date</label>
          <input class="input" type="date" id="startDate" name="startDate" required>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="endDate">End Date <span style="color:var(--color-text-muted)">(optional)</span></label>
          <input class="input" type="date" id="endDate" name="endDate">
        </div>

        <div class="form-group">
          <label class="form-group__label">Default success</label>
          <label class="toggle">
            <input class="toggle__input" type="checkbox" id="defaultMade" name="defaultMade">
            <span class="toggle__track"><span class="toggle__thumb"></span></span>
            <span class="toggle__label">Successful unless you mark it failed (e.g. didn't sleep late)</span>
          </label>
        </div>

        <div class="form-card__actions">
          <button type="submit" class="btn btn--primary btn--lg">Add Habit</button>
          <a href="/" class="btn btn--ghost">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script>
    document.getElementById('frequency').addEventListener('change', function() {
      document.getElementById('custom-frequency-container').style.display =
        this.value === 'CUSTOM' ? 'flex' : 'none';
    });

    document.getElementById('new-habit-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const freqSel = document.getElementById('frequency');
      const freq = freqSel.value === 'CUSTOM'
        ? parseInt(document.getElementById('customFrequency').value, 10)
        : parseInt(freqSel.value, 10);

      if (freqSel.value === 'CUSTOM' && isNaN(freq)) {
        alert('Please enter a custom frequency.');
        return;
      }

      const body = {
        name:        document.getElementById('name').value,
        frequency:   freq,
        startDate:   document.getElementById('startDate').value,
        endDate:     document.getElementById('endDate').value || null,
        defaultMade: document.getElementById('defaultMade').checked
      };

      const res = await fetch('/new-habit', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-XSRF-TOKEN': document.getElementById('logout-csrf').value
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        window.location.href = ENV.ROUTES.HOME;
      } else {
        alert('Failed to add habit. Please try again.');
      }
    });

    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/habits/add');
    }

    init();
  </script>
</body>
</html>
