<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — My Habits</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="stylesheet" href="/styles/pages/habits-list.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav">
        <a href="/"               class="topbar__link">Today</a>
        <a href="/habits/list"    class="topbar__link active">My Habits</a>
        <a href="/habits/table"   class="topbar__link">Overview</a>
        <a href="/habits/rules"   class="topbar__link">Rules</a>
        <a href="/kpis"           class="topbar__link">KPIs</a>
        <a href="/kpis/dashboard" class="topbar__link">KPI Dashboard</a>
      </nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="list-page">
    <div class="list-page__header">
      <h1 class="list-page__title">My Habits</h1>
      <div style="display:flex;gap:var(--space-3);align-items:center;">
        <div class="seg-tabs">
          <button class="seg-tab active" id="tab-active">Active</button>
          <button class="seg-tab"        id="tab-inactive">Inactive</button>
        </div>
        <a href="/habits/add" class="btn btn--primary">+ New Habit</a>
      </div>
    </div>

    <div class="habit-list-cards" id="habit-list-cards"></div>
  </main>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    function csrf() {
      const m = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='));
      return m ? decodeURIComponent(m.split('=')[1]) : '';
    }

    function freqLabel(f) {
      if (f === 1)  return 'Daily';
      if (f === 7)  return 'Weekly';
      if (f === 30) return 'Monthly';
      return `Every ${f} days`;
    }

    function renderHabits(habits, container) {
      container.innerHTML = '';

      if (!habits || habits.length === 0) {
        container.innerHTML = `
          <div class="list-empty">
            <h2>Nothing here yet</h2>
            <p>No habits in this category.</p>
            <a href="/habits/add" class="btn btn--primary">Create a habit</a>
          </div>`;
        return;
      }

      habits.forEach(h => {
        const row = document.createElement('div');
        row.className = 'habit-row';
        row.innerHTML = `
          <div class="habit-row__info">
            <div class="habit-row__name">${h.name}</div>
            <div class="habit-row__meta">
              <span class="badge badge--accent">${freqLabel(h.frequency)}</span>
              ${h.defaultMade ? '<span class="badge">Default success</span>' : ''}
            </div>
          </div>
          <div class="habit-row__actions">
            <a href="${ENV.ROUTES.HABIT_EDIT(h.id)}" class="row-action">Edit</a>
            <a href="${ENV.ROUTES.HABIT_INFO(h.id)}" class="row-action">Info</a>
            <button class="row-action row-action--danger delete-btn"
              data-id="${h.id}" data-name="${h.name}">Delete</button>
          </div>`;
        container.appendChild(row);
      });

      // Stagger in
      if (window.gsap) {
        gsap.to('.habit-row', { opacity: 1, y: 0, duration: 0.2, stagger: 0.04, ease: 'power2.out' });
      } else {
        document.querySelectorAll('.habit-row').forEach(r => { r.style.opacity = '1'; r.style.transform = 'none'; });
      }

      // Delete handlers
      container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const name = btn.dataset.name;
          const id   = btn.dataset.id;
          if (!confirm(`Delete "${name}"?`)) return;
          const res = await fetch(`/habits/delete/${id}`, {
            method: 'DELETE',
            headers: { 'X-XSRF-TOKEN': csrf() }
          });
          if (res.ok) {
            btn.closest('.habit-row').remove();
          } else {
            alert('Failed to delete habit.');
          }
        });
      });
    }

    let activeHabits   = null;
    let inactiveHabits = null;
    let currentTab     = 'active';

    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/habits/list');

      const container = document.getElementById('habit-list-cards');

      // Fetch both in parallel
      const [active, inactive] = await Promise.all([
        fetch(ENV.ENDPOINTS.HABITS_LIST, { credentials: 'include' }).then(r => r.json()),
        fetch('/habits/inactive', { credentials: 'include' }).then(r => r.json()).catch(() => [])
      ]);

      activeHabits   = active;
      inactiveHabits = inactive;

      renderHabits(activeHabits, container);

      document.getElementById('tab-active').addEventListener('click', () => {
        if (currentTab === 'active') return;
        currentTab = 'active';
        document.getElementById('tab-active').classList.add('active');
        document.getElementById('tab-inactive').classList.remove('active');
        renderHabits(activeHabits, container);
      });

      document.getElementById('tab-inactive').addEventListener('click', () => {
        if (currentTab === 'inactive') return;
        currentTab = 'inactive';
        document.getElementById('tab-inactive').classList.add('active');
        document.getElementById('tab-active').classList.remove('active');
        renderHabits(inactiveHabits, container);
      });
    }

    init();
  </script>
</body>
</html>
