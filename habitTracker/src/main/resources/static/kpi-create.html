<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — New KPI</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/molecules/form-group.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="stylesheet" href="/styles/pages/kpi.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/today" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav"></nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="form-page">
    <div class="form-card" style="max-width:640px;">
      <div>
        <div class="form-card__title">New KPI</div>
        <div class="form-card__subtitle">Define a key performance indicator to track over time.</div>
      </div>

      <div id="error-message" class="kpi-flash kpi-flash--error" style="display:none;"></div>

      <form id="kpi-form" class="form-card__fields">
        <div class="form-group">
          <label class="form-group__label" for="name">KPI Name <span style="color:var(--color-danger)">*</span></label>
          <input class="input" type="text" id="name" name="name"
            placeholder="e.g. Daily Steps, Reading Pages, Weight" required>
          <span class="form-group__hint">Must be unique — used as identifier</span>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="description">Description <span style="color:var(--color-text-muted)">(optional)</span></label>
          <textarea class="input" id="description" name="description"
            placeholder="Describe what this KPI measures…"
            rows="3" style="height:auto;resize:vertical;"></textarea>
        </div>

        <div class="form-group">
          <label class="form-group__label">Direction <span style="color:var(--color-danger)">*</span></label>
          <div class="radio-card-group">
            <label class="radio-card">
              <input type="radio" name="higherIsBetter" value="true" required>
              <span class="radio-card__icon">↑</span>
              <span class="radio-card__label">Higher is Better</span>
              <span class="radio-card__hint">Steps taken, books read…</span>
            </label>
            <label class="radio-card">
              <input type="radio" name="higherIsBetter" value="false">
              <span class="radio-card__icon">↓</span>
              <span class="radio-card__label">Lower is Better</span>
              <span class="radio-card__hint">Weight, phone time…</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-group__label">Linked Habits <span style="color:var(--color-text-muted)">(optional)</span></label>
          <div class="checkbox-group" id="habits-list">
            <span style="font-size:var(--text-sm);color:var(--color-text-muted);">Loading…</span>
          </div>
        </div>

        <div class="form-card__actions">
          <button type="submit" class="btn btn--primary btn--lg">Create KPI</button>
          <a href="/kpis" class="btn btn--ghost">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script>
    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/kpis');

      const habits    = await fetch('/api/kpis/available-habits', { credentials: 'include' }).then(r => r.json());
      const container = document.getElementById('habits-list');

      if (!habits || habits.length === 0) {
        container.innerHTML = `<span style="font-size:var(--text-sm);color:var(--color-text-muted);">No active habits. <a href="/habits/add" style="color:var(--color-accent);">Create one first</a>.</span>`;
      } else {
        container.innerHTML = '';
        habits.forEach(h => {
          const div = document.createElement('div');
          div.className = 'checkbox-option';
          div.innerHTML = `
            <input type="checkbox" id="habit${h.id}" name="habitIds" value="${h.id}">
            <label for="habit${h.id}">${h.name}</label>`;
          container.appendChild(div);
        });
      }
    }

    document.getElementById('kpi-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const dirVal = document.querySelector('input[name="higherIsBetter"]:checked');
      if (!dirVal) { alert('Please select a direction preference.'); return; }

      const checkedHabits = Array.from(document.querySelectorAll('input[name="habitIds"]:checked'))
        .map(cb => parseInt(cb.value, 10));

      const body = {
        name:           document.getElementById('name').value,
        description:    document.getElementById('description').value,
        higherIsBetter: dirVal.value === 'true',
        habitIds:       checkedHabits.length > 0 ? checkedHabits : null
      };

      const res = await fetch('/api/kpis/create', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-XSRF-TOKEN': document.getElementById('logout-csrf').value
        },
        body: JSON.stringify(body)
      });

      if (res.ok) {
        window.location.href = ENV.ROUTES.KPI_LIST;
      } else {
        const err = await res.json().catch(() => ({ error: 'Failed to create KPI' }));
        const msg = document.getElementById('error-message');
        msg.textContent = err.error || 'Failed to create KPI.';
        msg.style.display = 'block';
      }
    });

    init();
  </script>
</body>
</html>
