<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — KPI Dashboard</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/molecules/form-group.css">
  <link rel="stylesheet" href="/styles/molecules/modal.css">
  <link rel="stylesheet" href="/styles/molecules/seg-tabs.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="stylesheet" href="/styles/pages/kpi.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/today" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav"></nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="kpi-page">
    <div class="kpi-page__header">
      <h1 class="kpi-page__title">KPI Dashboard</h1>
      <div class="kpi-page__actions">
        <a href="/kpis" class="btn btn--ghost">Manage KPIs</a>
      </div>
    </div>

    <div class="dashboard-controls">
      <div class="seg-tabs">
        <button id="weeklyBtn" class="seg-tab active" onclick="setPeriod('weekly')">Weekly</button>
        <button id="monthlyBtn" class="seg-tab" onclick="setPeriod('monthly')">Monthly</button>
      </div>
      <button class="btn btn--ghost btn--sm" onclick="refreshDashboard()">Refresh</button>
    </div>

    <div class="kpi-grid" id="dashboard-container"></div>
  </main>

  <!-- Add Data Modal -->
  <div class="modal-overlay" id="addDataModal">
    <div class="modal-box">
      <div class="modal-box__header">
        <span class="modal-box__title">Add KPI Data</span>
        <button class="modal-box__close" onclick="closeModal()">&#x2715;</button>
      </div>
      <form id="addDataForm" class="modal-box__fields">
        <input type="hidden" id="kpiName" name="kpiName">
        <div class="form-group">
          <label class="form-group__label" for="dataDate">Date</label>
          <input class="input" type="date" id="dataDate" name="date" required>
        </div>
        <div class="form-group">
          <label class="form-group__label" for="dataValue">Value</label>
          <input class="input" type="number" step="0.01" id="dataValue" name="value" required>
        </div>
        <div class="modal-box__actions">
          <button type="submit" class="btn btn--primary">Add Data</button>
          <button type="button" class="btn btn--ghost" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    // Dark theme defaults for Chart.js — must run before kpi-dashboard.js
    document.addEventListener('DOMContentLoaded', () => {
      if (window.Chart) {
        Chart.defaults.color          = '#8b90a0';
        Chart.defaults.borderColor    = 'rgba(255,255,255,0.07)';
        Chart.defaults.font.family    = "'IBM Plex Mono', monospace";
        Chart.defaults.font.size      = 11;
        Chart.defaults.plugins.legend.labels.color = '#8b90a0';
      }
    });

    var kpis = [];

    // Override modal to use CSS class
    function addDataToKPI(kpiName) {
      document.getElementById('kpiName').value = kpiName;
      document.getElementById('addDataModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('addDataModal').classList.remove('open');
      document.getElementById('addDataForm').reset();
      document.getElementById('dataDate').value = new Date().toISOString().split('T')[0];
    }

    window.addEventListener('click', e => {
      if (e.target === document.getElementById('addDataModal')) closeModal();
    });
  </script>
  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="/js/kpi-dashboard.js"></script>
  <script>
    // seg-tab active synced with kpi-dashboard.js's setPeriod
    const _origSetPeriod = window.setPeriod;
    window.setPeriod = function(period) {
      document.querySelectorAll('.seg-tab').forEach(b => b.classList.remove('active'));
      document.getElementById(period + 'Btn').classList.add('active');
      if (_origSetPeriod) _origSetPeriod(period);
    };

    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/kpis/dashboard');

      kpis = await fetch('/api/kpis/dashboard', { credentials: 'include' }).then(r => r.json());
      const container = document.getElementById('dashboard-container');

      if (!kpis || kpis.length === 0) {
        container.innerHTML = `
          <div class="kpi-empty" style="grid-column:1/-1;">
            <h2>No KPIs yet</h2>
            <p>Create your first KPI to start tracking your performance.</p>
            <a href="/kpis/create" class="btn btn--primary btn--lg">Create KPI</a>
          </div>`;
        return;
      }

      kpis.forEach(kpi => {
        const card = document.createElement('div');
        card.className = 'kpi-chart-card';
        card.setAttribute('data-kpi-name', kpi.name);
        card.innerHTML = `
          <div class="chart-header">
            <h3 class="chart-title">${kpi.name}</h3>
            <div class="chart-meta">
              <span class="direction-indicator ${kpi.higherIsBetter ? 'up' : 'down'}">${kpi.higherIsBetter ? '↑' : '↓'}</span>
              <span class="trend-badge neutral" id="trend-${kpi.name}">Loading…</span>
            </div>
          </div>
          <div class="chart-container"><canvas id="chart-${kpi.name}" class="kpi-chart"></canvas></div>
          <div class="chart-footer">
            <div class="chart-stats">
              <div class="stat-item">
                <span class="stat-label">Latest:</span>
                <span class="stat-value" id="latest-${kpi.name}">—</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Trend:</span>
                <span class="stat-value" id="ema-${kpi.name}">—</span>
              </div>
            </div>
            <button class="btn btn--primary btn--sm" onclick="addDataToKPI('${kpi.name}')">Add Data</button>
          </div>`;
        container.appendChild(card);
      });

      if (typeof refreshDashboard === 'function') refreshDashboard();
    }

    init();
  </script>
</body>
</html>
