<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Habit</title>
    <link rel="stylesheet" href="/editView/edit-habit.css">
    <link rel="stylesheet" href="/css/navigation.css">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <div class="nav-brand"><a href="/" class="nav-logo">HabitTracker</a></div>
            <ul class="nav-links">
                <li><a href="/" class="nav-item">Today</a></li>
                <li><a href="/habits/list" class="nav-item">My Habits</a></li>
                <li><a href="/habits/table" class="nav-item">Overview</a></li>
                <li><a href="/habits/rules" class="nav-item">Rules</a></li>
                <li><a href="/kpis" class="nav-item">KPIs</a></li>
                <li><a href="/kpis/dashboard" class="nav-item">KPI Dashboard</a></li>
                <li>
                    <form id="logout-form" action="/logout" method="post" style="margin:0">
                        <input type="hidden" id="logout-csrf" name="_csrf" value="">
                        <button type="submit" class="nav-item">Sign out</button>
                    </form>
                </li>
            </ul>
        </div>
    </nav>

    <h1 class="date-header">
        Edit Habit
        <span class="date-tooltip">Modify your habit details</span>
    </h1>

    <!-- data-habit-id is set by init() so edit-habit.js can read it -->
    <form class="habit-form" id="edit-form">
        <div class="form-group">
            <label for="name">Habit Name</label>
            <input type="text" id="name" name="name" class="habit-input" required>
        </div>
        <div class="form-group">
            <label for="frequency">Frequency</label>
            <select id="frequency" name="frequency" class="habit-input" required>
                <option value="">Select frequency</option>
                <option value="1">Daily</option>
                <option value="7">Weekly</option>
                <option value="30">Monthly</option>
                <option value="CUSTOM">Custom</option>
            </select>
        </div>
        <div id="custom-frequency-container" class="form-group" style="display:none;">
            <label for="customFrequency">Custom Frequency</label>
            <input type="number" id="customFrequency" name="customFrequency" class="habit-input">
            <small class="form-text">Number of days between occurrences</small>
        </div>
        <div class="form-group">
            <label for="isActive">Active Status</label>
            <div class="checkbox-wrapper">
                <input type="checkbox" id="isActive" name="active">
                <span class="checkbox-label">Keep this habit active</span>
            </div>
        </div>
        <div class="form-group">
            <label for="startDate">Start Date</label>
            <input type="date" id="startDate" name="startDate" class="habit-input">
        </div>
        <div class="form-group">
            <label for="endDate">End Date</label>
            <input type="date" id="endDate" name="endDate" class="habit-input">
        </div>
        <div class="form-group">
            <label for="defaultMade">Mark as successful by default</label>
            <div class="checkbox-wrapper">
                <input type="checkbox" id="defaultMade" name="defaultMade">
                <span class="checkbox-label">Check if this habit is successful unless you fail (e.g. sleeping late).</span>
            </div>
        </div>
        <button type="submit" class="habit-button">Update Habit</button>
    </form>

    <script src="/editView/edit-habit.js"></script>
    <script>
        function getCsrfCookie() {
            const match = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='));
            return match ? decodeURIComponent(match.split('=')[1]) : '';
        }

        async function init() {
            const authRes = await fetch('/auth/me', { credentials: 'include' });
            if (!authRes.ok) { window.location.href = '/login'; return; }

            document.getElementById('logout-csrf').value = getCsrfCookie();

            // extract ID from URL path: /habits/edit/5
            const habitId = window.location.pathname.split('/').pop();
            const habit = await fetch(`/api/habits/${habitId}`, { credentials: 'include' }).then(r => r.json());

            // set data-habit-id so edit-habit.js submit handler can read it
            document.getElementById('edit-form').setAttribute('data-habit-id', habit.id);

            document.getElementById('name').value = habit.name || '';
            document.getElementById('isActive').checked = habit.active !== false;
            document.getElementById('startDate').value = habit.startDate || '';
            document.getElementById('endDate').value = habit.endDate || '';
            document.getElementById('defaultMade').checked = habit.defaultMade === true;

            const freqSel = document.getElementById('frequency');
            const isStandard = [1, 7, 30].includes(habit.frequency);
            if (isStandard) {
                freqSel.value = String(habit.frequency);
            } else {
                freqSel.value = 'CUSTOM';
                document.getElementById('custom-frequency-container').style.display = 'block';
                document.getElementById('customFrequency').value = habit.frequency;
            }
        }

        init();
    </script>
</body>
</html>
