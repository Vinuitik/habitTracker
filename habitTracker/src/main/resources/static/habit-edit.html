<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — Edit Habit</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/molecules/form-group.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/today" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav">
        <a href="/today"               class="topbar__link">Today</a>
        <a href="/habits/list"    class="topbar__link active">My Habits</a>
        <a href="/habits/table"   class="topbar__link">Overview</a>
        <a href="/habits/rules"   class="topbar__link">Rules</a>
        <a href="/kpis"           class="topbar__link">KPIs</a>
        <a href="/kpis/dashboard" class="topbar__link">KPI Dashboard</a>
      </nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="form-page">
    <div class="form-card">
      <div>
        <div class="form-card__title">Edit Habit</div>
        <div class="form-card__subtitle">Update the details for this habit.</div>
      </div>

      <form id="edit-form" class="habit-form form-card__fields">
        <div class="form-group">
          <label class="form-group__label" for="name">Habit Name</label>
          <input class="input" type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="frequency">Frequency</label>
          <select class="input" id="frequency" name="frequency" required>
            <option value="">Select frequency</option>
            <option value="1">Daily</option>
            <option value="7">Weekly</option>
            <option value="30">Monthly</option>
            <option value="CUSTOM">Custom</option>
          </select>
        </div>

        <div class="form-group" id="custom-frequency-container" style="display:none;">
          <label class="form-group__label" for="customFrequency">Custom interval (days)</label>
          <input class="input" type="number" id="customFrequency" name="customFrequency" min="1">
          <span class="form-group__hint">Days between each occurrence</span>
        </div>

        <div class="form-group">
          <label class="form-group__label">Active</label>
          <label class="toggle">
            <input class="toggle__input" type="checkbox" id="isActive" name="active">
            <span class="toggle__track"><span class="toggle__thumb"></span></span>
            <span class="toggle__label">Keep this habit active</span>
          </label>
        </div>

        <div class="form-group">
          <label class="form-group__label" for="startDate">Start Date</label>
          <input class="input" type="date" id="startDate" name="startDate">
        </div>

        <div class="form-group">
          <label class="form-group__label" for="endDate">End Date</label>
          <input class="input" type="date" id="endDate" name="endDate">
        </div>

        <div class="form-group">
          <label class="form-group__label">Default success</label>
          <label class="toggle">
            <input class="toggle__input" type="checkbox" id="defaultMade" name="defaultMade">
            <span class="toggle__track"><span class="toggle__thumb"></span></span>
            <span class="toggle__label">Successful unless you mark it failed</span>
          </label>
        </div>

        <div class="form-card__actions">
          <button type="submit" class="btn btn--primary btn--lg">Save Changes</button>
          <a href="/habits/list" class="btn btn--ghost">Cancel</a>
        </div>
      </form>
    </div>
  </main>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script src="/editView/edit-habit.js"></script>
  <script>
    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }

      initTopbar('/habits/list');

      const habitId = window.location.pathname.split('/').pop();
      const habit   = await fetch(ENV.ENDPOINTS.HABIT_INFO(habitId), { credentials: 'include' }).then(r => r.json());

      document.getElementById('edit-form').setAttribute('data-habit-id', habit.id);
      document.getElementById('name').value        = habit.name || '';
      document.getElementById('isActive').checked  = habit.active !== false;
      document.getElementById('startDate').value   = habit.startDate || '';
      document.getElementById('endDate').value     = habit.endDate || '';
      document.getElementById('defaultMade').checked = habit.defaultMade === true;

      const freqSel   = document.getElementById('frequency');
      const isStandard = [1, 7, 30].includes(habit.frequency);
      if (isStandard) {
        freqSel.value = String(habit.frequency);
      } else {
        freqSel.value = 'CUSTOM';
        document.getElementById('custom-frequency-container').style.display = 'flex';
        document.getElementById('customFrequency').value = habit.frequency;
      }
    }

    init();
  </script>
</body>
</html>
