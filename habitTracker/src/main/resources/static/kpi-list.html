<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HabitTracker — KPIs</title>
  <link rel="stylesheet" href="/styles/tokens.css">
  <link rel="stylesheet" href="/styles/reset.css">
  <link rel="stylesheet" href="/styles/atoms/button.css">
  <link rel="stylesheet" href="/styles/atoms/input.css">
  <link rel="stylesheet" href="/styles/molecules/form-group.css">
  <link rel="stylesheet" href="/styles/molecules/modal.css">
  <link rel="stylesheet" href="/styles/organisms/topbar.css">
  <link rel="stylesheet" href="/styles/pages/kpi.css">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a href="/today" class="topbar__brand">HabitTracker</a>
      <nav class="topbar__nav"></nav>
      <form id="logout-form" action="/logout" method="post">
        <input type="hidden" id="logout-csrf" name="_csrf" value="">
        <button type="submit" class="topbar__signout">Sign out</button>
      </form>
    </div>
  </header>

  <main class="kpi-page">
    <div class="kpi-page__header">
      <h1 class="kpi-page__title">KPIs</h1>
      <div class="kpi-page__actions">
        <a href="/kpis/create"    class="btn btn--primary">+ New KPI</a>
        <a href="/kpis/dashboard" class="btn btn--ghost">Dashboard</a>
      </div>
    </div>

    <div id="flash-message"></div>
    <div id="kpi-container"></div>
  </main>

  <!-- Add Data Modal -->
  <div class="modal-overlay" id="addDataModal">
    <div class="modal-box">
      <div class="modal-box__header">
        <span class="modal-box__title">Add KPI Data</span>
        <button class="modal-box__close" onclick="closeModal()">&#x2715;</button>
      </div>
      <form id="addDataForm" class="modal-box__fields">
        <input type="hidden" id="kpiName" name="kpiName">
        <div class="form-group">
          <label class="form-group__label" for="dataDate">Date</label>
          <input class="input" type="date" id="dataDate" name="date" required>
        </div>
        <div class="form-group">
          <label class="form-group__label" for="dataValue">Value</label>
          <input class="input" type="number" step="0.01" id="dataValue" name="value" required>
        </div>
        <div class="modal-box__actions">
          <button type="submit" class="btn btn--primary">Add Data</button>
          <button type="button" class="btn btn--ghost" onclick="closeModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Auto-Fill Settings Modal -->
  <div class="modal-overlay" id="autoFillModal">
    <div class="modal-box">
      <div class="modal-box__header">
        <span class="modal-box__title">Auto-Fill Settings</span>
        <button class="modal-box__close" onclick="closeAutoFillModal()">&#x2715;</button>
      </div>
      <form id="autoFillForm" class="modal-box__fields">
        <input type="hidden" id="autoFillKpiName" name="kpiName">
        <div class="form-group">
          <div class="checkbox-option">
            <input type="checkbox" id="autoFillEnabledInput" name="autoFillEnabled">
            <label for="autoFillEnabledInput">Auto-fill missed days</label>
          </div>
          <span class="form-group__hint">If you forget to log a day, a nightly job fills it in with the default value below.</span>
        </div>
        <div class="form-group" id="autoFillDefaultValueGroup" style="display:none;">
          <label class="form-group__label" for="autoFillDefaultValueInput">Default Value</label>
          <input class="input" type="number" step="any" id="autoFillDefaultValueInput" name="defaultValue" placeholder="e.g. 0">
        </div>
        <div class="modal-box__actions">
          <button type="submit" class="btn btn--primary">Save</button>
          <button type="button" class="btn btn--ghost" onclick="closeAutoFillModal()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/env.js"></script>
  <script src="/js/topbar.js"></script>
  <script>
    // Override modal show/hide to use new CSS class
    function addData(kpiName) {
      document.getElementById('kpiName').value = kpiName;
      document.getElementById('addDataModal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('addDataModal').classList.remove('open');
      document.getElementById('addDataForm').reset();
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('dataDate').value = today;
    }

    window.addEventListener('click', e => {
      if (e.target === document.getElementById('addDataModal')) closeModal();
      if (e.target === document.getElementById('autoFillModal')) closeAutoFillModal();
    });

    function openAutoFillModal(kpiName, autoFillEnabled, defaultValue) {
      document.getElementById('autoFillKpiName').value = kpiName;
      document.getElementById('autoFillEnabledInput').checked = !!autoFillEnabled;
      document.getElementById('autoFillDefaultValueInput').value = defaultValue != null ? defaultValue : '';
      document.getElementById('autoFillDefaultValueGroup').style.display = autoFillEnabled ? '' : 'none';
      document.getElementById('autoFillModal').classList.add('open');
    }

    function closeAutoFillModal() {
      document.getElementById('autoFillModal').classList.remove('open');
      document.getElementById('autoFillForm').reset();
    }

    document.getElementById('autoFillEnabledInput').addEventListener('change', function(e) {
      document.getElementById('autoFillDefaultValueGroup').style.display = e.target.checked ? '' : 'none';
    });

    document.getElementById('autoFillForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const kpiName = document.getElementById('autoFillKpiName').value;
      const enabled = document.getElementById('autoFillEnabledInput').checked;
      const valueRaw = document.getElementById('autoFillDefaultValueInput').value;

      if (enabled && valueRaw === '') {
        alert('Enter a default value, or turn off auto-fill.');
        return;
      }

      const res = await fetch(`/api/kpis/${encodeURIComponent(kpiName)}/default-fill`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-XSRF-TOKEN': csrf()
        },
        body: JSON.stringify({
          autoFillEnabled: enabled,
          defaultValue: enabled ? parseFloat(valueRaw) : null
        })
      });

      if (res.ok) {
        closeAutoFillModal();
        window.location.reload();
      } else {
        const err = await res.json().catch(() => ({ error: 'Failed to save auto-fill settings' }));
        alert(err.error || 'Failed to save auto-fill settings.');
      }
    });
  </script>
  <script src="/js/kpi-list.js"></script>
  <script>
    function csrf() {
      const m = document.cookie.split('; ').find(r => r.startsWith('XSRF-TOKEN='));
      return m ? decodeURIComponent(m.split('=')[1]) : '';
    }

    function showFlash(msg, type) {
      const el = document.getElementById('flash-message');
      el.className = `kpi-flash kpi-flash--${type}`;
      el.textContent = msg;
      setTimeout(() => { el.textContent = ''; el.className = ''; }, 5000);
    }

    async function init() {
      const auth = await fetch(ENV.ENDPOINTS.AUTH_ME, { credentials: 'include' });
      if (!auth.ok) { window.location.href = ENV.ROUTES.LOGIN; return; }
      initTopbar('/kpis');

      const kpis      = await fetch('/api/kpis', { credentials: 'include' }).then(r => r.json());
      const container = document.getElementById('kpi-container');

      if (!kpis || kpis.length === 0) {
        container.innerHTML = `
          <div class="kpi-empty">
            <h2>No KPIs yet</h2>
            <p>Start tracking your performance by creating your first KPI.</p>
            <a href="/kpis/create" class="btn btn--primary btn--lg">Create Your First KPI</a>
          </div>`;
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'kpi-grid';

      kpis.forEach(kpi => {
        const created = kpi.createdAt
          ? new Date(kpi.createdAt).toLocaleDateString('en-US', { month: 'short', day: '2-digit', year: 'numeric' })
          : '';
        const linked = kpi.linkedHabitIds && kpi.linkedHabitIds.length > 0
          ? `${kpi.linkedHabitIds.length} linked habit${kpi.linkedHabitIds.length > 1 ? 's' : ''}`
          : null;
        const autoFillBadge = kpi.autoFillEnabled
          ? `<span class="kpi-card__direction" style="color:var(--color-accent);background:var(--color-accent-dim);">Auto-fill: ${kpi.defaultValue}</span>`
          : null;

        const card = document.createElement('div');
        card.className = 'kpi-card';
        card.innerHTML = `
          <div>
            <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-3);flex-wrap:wrap;">
              <span class="kpi-card__name">${kpi.name}</span>
              <div style="display:flex;gap:var(--space-2);flex-wrap:wrap;">
                <span class="kpi-card__direction ${kpi.higherIsBetter ? 'up' : 'down'}">
                  ${kpi.higherIsBetter ? '↑ Higher better' : '↓ Lower better'}
                </span>
                ${autoFillBadge || ''}
              </div>
            </div>
            ${kpi.description ? `<div class="kpi-card__desc" style="margin-top:var(--space-2);">${kpi.description}</div>` : ''}
          </div>
          <div class="kpi-card__meta">
            ${created ? `Created ${created}` : ''}${linked ? ` · ${linked}` : ''}
          </div>
          <div class="kpi-card__actions">
            <button class="btn btn--primary btn--sm" onclick="addData('${kpi.name}')">Add Data</button>
            <button class="btn btn--ghost btn--sm" onclick="viewData('${kpi.name}')">View Charts</button>
            <button class="btn btn--ghost btn--sm" onclick="openAutoFillModal('${kpi.name}', ${!!kpi.autoFillEnabled}, ${kpi.defaultValue != null ? kpi.defaultValue : 'null'})">Auto-Fill</button>
            <button class="btn btn--danger btn--sm" onclick="deleteKPI('${kpi.name}')">Delete</button>
          </div>`;
        grid.appendChild(card);
      });

      container.appendChild(grid);
    }

    // Override showMessage from kpi-list.js to use our flash
    window.showMessage = (msg, type) => showFlash(msg, type);

    init();
  </script>
</body>
</html>
