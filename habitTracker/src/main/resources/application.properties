spring.application.name=habitTracker

spring.data.mongodb.uri=${MONGO_URI}

#spring.data.mongodb.uri=mongodb://root:example@localhost:27017/habits?authSource=admin

server.port=8089

server.forward-headers-strategy=native

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:disabled}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:disabled}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

jwt.secret=${JWT_SECRET:changeme-at-least-32-chars-long-secret}
jwt.expiration-ms=86400000
