<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — HabitTracker</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
</head>
<body>
<div class="auth-card">
  <a href="/landing" class="auth-logo">HabitTracker</a>

  <h2>Sign in</h2>

  <div class="auth-error"   th:if="${param.error}">Invalid email or password.</div>
  <div class="auth-success" th:if="${param.logout}">You have been signed out.</div>

  <form th:action="@{/login}" method="post">
    <div>
      <label for="username">Email</label>
      <input id="username" type="email" name="username" required autofocus autocomplete="email">
    </div>
    <div>
      <label for="password">Password</label>
      <input id="password" type="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit">Sign in</button>
  </form>

  <div class="auth-divider">or</div>

  <a class="oauth-btn" th:href="@{/oauth2/authorization/google}">Continue with Google</a>

  <div class="auth-links">
    <a th:href="@{/register}">Create an account</a>
  </div>

  <a href="/landing" class="auth-back">← Back to home</a>
</div>
</body>
</html>
