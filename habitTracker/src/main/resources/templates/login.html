<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — HabitTracker</title>
    <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
<div class="auth-card">
    <a href="/" class="auth-logo">HabitTracker</a>
    <h2>Sign in</h2>
    <div class="auth-error" th:if="${param.error}">Invalid email or password.</div>
    <div class="auth-success" th:if="${param.logout}">You have been logged out.</div>
    <form th:action="@{/login}" method="post">
        <label for="username">Email</label>
        <input id="username" type="email" name="username" required autofocus>
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>
        <button type="submit">Sign in</button>
    </form>
    <div class="auth-divider">or</div>
    <a class="oauth-btn" th:href="@{/oauth2/authorization/google}">Sign in with Google</a>
    <div class="auth-links"><a th:href="@{/register}">Create an account</a></div>
</div>
</body>
</html>
