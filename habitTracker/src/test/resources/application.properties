# Test-only config. Mongo is provided by Testcontainers via @ServiceConnection, so the URI here
# is only a placeholder. The key reason this file exists: supply a real (non-default) JWT secret
# so JwtUtil's fail-fast guard is satisfied during the test context startup.
spring.application.name=habitTracker-test

spring.data.mongodb.uri=mongodb://localhost:27017/habits-test
server.port=0

jwt.secret=test-secret-not-the-insecure-default-at-least-32-bytes-long
jwt.expiration-ms=86400000

spring.security.oauth2.client.registration.google.client-id=disabled
spring.security.oauth2.client.registration.google.client-secret=disabled
spring.security.oauth2.client.registration.google.scope=openid,email,profile
