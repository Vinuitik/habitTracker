version: '3.8'

services:
  mongodbHabit:
    image: mongo:7
    container_name: mongodbHabit
    command: mongod --wiredTigerCacheSizeGB 0.25
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: habits
    mem_limit: 512m
    restart: unless-stopped

  javaapp:
    build:
      context: ./habitTracker
      dockerfile: Dockerfile
    container_name: javaapp
    depends_on:
      - mongodbHabit
    environment:
      MONGO_URI: mongodb://root:example@mongodbHabit:27017/habits?authSource=admin
      TZ: Europe/London
      JAVA_TOOL_OPTIONS: -Xmx256m -Xms64m
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089"]
      interval: 5s
      timeout: 3s
      retries: 10
    mem_limit: 384m
    restart: unless-stopped

  mongo-backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    container_name: mongo-backup
    depends_on:
      - mongodbHabit
    environment:
      MONGO_HOST: mongodbHabit
      MONGO_USER: root
      MONGO_PASS: example
      MONGO_DB: habits
      MONGO_AUTH_DB: admin
      TZ: Europe/London
    volumes:
      - ./backup/habitbackup.json:/app/habitbackup.json:ro
    mem_limit: 128m
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    depends_on:
      javaapp:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    mem_limit: 64m
    restart: unless-stopped

  cloudflared:
    build:
      context: ./cloudflared
      dockerfile: Dockerfile
    dns:
      - 1.1.1.1
      - 1.0.0.1
    container_name: cloudflared
    depends_on:
      - caddy
    mem_limit: 64m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 20241 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  caddy_data:
  caddy_config:
